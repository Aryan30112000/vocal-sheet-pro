<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocal Sheet Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <header>
            <div class="status-bar">
                <span id="auth-status">Checking connection...</span>
                <button id="logout-button" style="display:none; background:none; color:#ff453a; border:none; cursor:pointer;">Sign Out</button>
            </div>
            <h1>Vocal Sheet <span>PRO</span></h1>
        </header>

        <main id="main-app" style="display:none;">
            <div class="voice-section">
                <canvas id="visualizer"></canvas>
                <p id="mic-status">Ready to listen</p>
            </div>

            <div class="input-group">
                <select id="language-select">
                    <option value="en-IN">English (India)</option>
                    <option value="hi-IN">Hindi (India)</option>
                </select>
                <input type="text" id="task-input" placeholder="Say 'Office: Meeting'...">
            </div>

            <div class="actions">
                <button id="mic-button" class="btn-mic">🎤</button>
                <button id="save-text-button" class="btn-save">Save Task</button>
            </div>

            <a id="sheet-link" target="_blank" class="sheet-btn" style="display:none;">📂 Open Google Sheet</a>
        </main>

        <div id="auth-section">
            <p style="color:#888; margin-bottom:20px;">Organize your life with your voice.</p>
            <button id="login-button" class="btn-login">Login with Google</button>
        </div>

        <div id="toast-container"></div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
